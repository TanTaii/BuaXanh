<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bữa Xanh | Delivery</title>
    <link rel="icon" type="image/png" href="image/Logo.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/common.js" defer></script>
    <script type="module" src="js/client/shipper-orders.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-display min-h-screen flex flex-col">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 text-primary">
                <img src="image/Logo.png" alt="Bữa Xanh" class="h-8 w-auto object-contain" />
                <div>
                    <h1 class="text-lg font-extrabold text-slate-900">Bữa Xanh</h1>
                    <p class="text-[11px] font-bold uppercase tracking-wider text-primary">Delivery Portal</p>
                </div>
            </a>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase tracking-wider">Nhân viên giao hàng</p>
                <p id="shipper-name" class="text-sm font-bold text-slate-900">...</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-4 md:px-6 py-5 md:py-8 flex-1">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6">
            <div>
                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Đơn hàng của tôi</h2>
                <p class="text-sm text-slate-500 mt-1">Danh sách đơn hàng được admin chỉ định giao</p>
            </div>
            <div class="grid grid-cols-3 gap-2 p-1 bg-slate-100 rounded-xl w-full md:w-auto">
                <button data-shipper-filter="all" class="px-3 py-2 rounded-lg text-xs md:text-sm font-bold bg-primary text-white">Tất cả</button>
                <button data-shipper-filter="shipping" class="px-3 py-2 rounded-lg text-xs md:text-sm font-semibold text-slate-600 hover:bg-slate-100">Đang giao</button>
                <button data-shipper-filter="delivered" class="px-3 py-2 rounded-lg text-xs md:text-sm font-semibold text-slate-600 hover:bg-slate-100">Đã giao</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 md:gap-4 mb-6">
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <p class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-slate-500">Tổng đơn</p>
                <p id="shipper-stat-total" class="text-2xl md:text-3xl font-extrabold text-slate-900 mt-1 md:mt-2">0</p>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <p class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-slate-500">Đang giao</p>
                <p id="shipper-stat-shipping" class="text-2xl md:text-3xl font-extrabold text-blue-700 mt-1 md:mt-2">0</p>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-5">
                <p class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-slate-500">Đã giao</p>
                <p id="shipper-stat-delivered" class="text-2xl md:text-3xl font-extrabold text-emerald-700 mt-1 md:mt-2">0</p>
            </div>
        </div>

        <div id="delivery-orders-mobile" class="md:hidden space-y-3 mb-4">
            <div class="bg-white rounded-2xl border border-slate-200 px-4 py-8 text-center text-sm text-slate-500">Đang tải dữ liệu...</div>
        </div>

        <div class="hidden md:block bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full min-w-[980px]">
                    <thead>
                        <tr class="bg-slate-50 text-xs uppercase tracking-wider text-slate-600 font-bold">
                            <th class="px-6 py-4 text-left">Mã đơn</th>
                            <th class="px-6 py-4 text-left">Khách hàng</th>
                            <th class="px-6 py-4 text-left">Điện thoại</th>
                            <th class="px-6 py-4 text-left">Địa chỉ</th>
                            <th class="px-6 py-4 text-left">Tổng tiền</th>
                            <th class="px-6 py-4 text-left">Trạng thái</th>
                            <th class="px-6 py-4 text-left">Cập nhật</th>
                            <th class="px-6 py-4 text-right">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="shipper-orders-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="8" class="px-6 py-10 text-center text-slate-500">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
