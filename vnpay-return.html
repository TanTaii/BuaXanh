<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bữa Xanh | Kết quả thanh toán VNPay</title>
    <link rel="icon" type="image/png" href="image/Logo.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/common.js" defer></script>
    <script type="module" src="js/client/vnpay-return.js"></script>
</head>
<body class="bg-[#f8f9fa] text-slate-900 font-display transition-colors duration-300 antialiased min-h-screen">
    <main class="min-h-screen flex items-center justify-center px-4 py-10">
        <section class="w-full max-w-2xl bg-white rounded-2xl shadow-xl border border-slate-200 p-8 md:p-10">
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center gap-2 text-primary font-extrabold text-xl">
                    <img src="image/Logo.png" alt="Bữa Xanh" class="h-8 w-auto object-contain" />
                    <span>Bữa Xanh</span>
                </a>
                <h1 class="text-2xl md:text-3xl font-extrabold mt-5">Kết quả thanh toán VNPay</h1>
                <p class="text-slate-500 mt-2" id="vnpay-status-subtitle">Đang xác thực giao dịch từ VNPay...</p>
            </div>

            <div id="vnpay-status-card" class="rounded-xl border border-slate-200 p-6 bg-slate-50">
                <div class="flex items-center justify-center gap-3 text-amber-600" id="vnpay-status-indicator">
                    <span class="material-symbols-outlined animate-spin">progress_activity</span>
                    <span class="font-semibold">Đang xử lý</span>
                </div>

                <div class="mt-6 space-y-3 text-sm">
                    <div class="flex items-center justify-between border-b border-dashed border-slate-200 pb-2">
                        <span class="text-slate-500">Mã đơn hàng</span>
                        <span class="font-semibold" id="vnpay-order-id">--</span>
                    </div>
                    <div class="flex items-center justify-between border-b border-dashed border-slate-200 pb-2">
                        <span class="text-slate-500">Mã giao dịch VNPay</span>
                        <span class="font-semibold" id="vnpay-trans-no">--</span>
                    </div>
                    <div class="flex items-center justify-between border-b border-dashed border-slate-200 pb-2">
                        <span class="text-slate-500">Số tiền</span>
                        <span class="font-semibold text-primary" id="vnpay-amount">--</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-slate-500">Mã phản hồi</span>
                        <span class="font-semibold" id="vnpay-response-code">--</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-3">
                <a href="Account.html?tab=orders" class="w-full text-center bg-primary hover:bg-[#c1141d] text-white font-bold py-3 rounded-xl transition-colors">Xem đơn hàng</a>
                <a href="Product.html" class="w-full text-center bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-3 rounded-xl transition-colors">Tiếp tục mua sắm</a>
            </div>

            <p class="text-xs text-slate-400 mt-6 text-center">
                Môi trường test VNPay. Không sử dụng cấu hình ký checksum phía client khi triển khai production.
            </p>
        </section>
    </main>
</body>
</html>
